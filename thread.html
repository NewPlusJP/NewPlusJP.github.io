<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スレッド詳細 - NewPlusJP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <script 
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" 
    crossorigin="anonymous"
  ></script>
</head>
<body>

  <header>
    <h1><a href="index.html" style="color:white; text-decoration:none;">NewPlusJP</a></h1>
  </header>

  <main id="single-thread-container">
    <div class="aa">
      <p id="loading-msg" style="color:#666;">データを読み込んでいます...</p>
      
      <div id="loading-hint" style="display:none; margin-top:20px; padding:15px; border:1px solid #ccc; background:#f9f9f9; font-size:0.9em;">
        <p><b>なかなか読み込まれない場合：</b></p>
        <ul style="text-align:left; display:inline-block;">
          <li>ブラウザの「追跡防止（トラッキング防止）」機能をオフにしてみてください。</li>
          <li>広告ブロック（AdBlock等）を一時的にオフにしてみてください。</li>
          <li>URLに正しいIDが含まれているか確認してください。</li>
        </ul>
      </div>

      <script>
  // 3秒経ってもコンテンツが表示されなければヒントを出す
  setTimeout(() => {
    const list = document.getElementById('res-list');
    if (!list || list.innerText === "読み込み中...") {
      document.getElementById('loading-hint').style.display = 'block';
      const msg = document.getElementById('loading-msg');
      if(msg) msg.style.display = 'none';
    }
  }, 3000);
</script>

      <noscript>
        <p style="color:red;">JavaScriptが無効です。掲示板を利用するにはブラウザの設定でJavaScriptを有効にしてください。</p>
      </noscript>
    </div>
  </main>

  <footer style="margin-top:40px; border-top:1px solid #ccc; padding:20px; text-align:center; font-size:0.8em; color:#888;">
    <p>© 2026 NewPlusJP - <a href="rule.html" style="color:#888;">利用規約・著作権</a></p>
    <p><a href="index.html" style="text-decoration:none;">■ トップへ戻る</a></p>
  </footer>

  <script src="config.js"></script> 
  <script src="thread.js"></script>

</body>
</html>
