<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
    // --- 1. 初期化 ---
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- 2. 【重要】エスケープ関数 ---
    function escapeHTML(str) {
        if (!str) return "";
        return String(str).replace(/[&<>"']/g, function(m) {
            return {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[m];
        });
    }

    // --- 3. スレッド一覧の読み込み（セキュリティ対策版） ---
    async function loadThreads() {
        const listContainer = document.getElementById('thread-list');
        const { data: threads, error } = await supabaseClient
            .from('threads')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            listContainer.innerHTML = "読み込みエラー: " + escapeHTML(error.message);
            return;
        }

        if (!threads || threads.length === 0) {
            listContainer.innerHTML = "スレッドがありません。";
            return;
        }

        listContainer.innerHTML = threads.map(t => {
            // 表示データをすべてエスケープ
            const safeTitle = escapeHTML(t.title);
            const safeName = escapeHTML(t.name || "名無しさん");
            const safeId = escapeHTML(t.id);

            return `
                <div class="thread-row">
                    <a href="thread.html?id=${safeId}" class="thread-link">${safeTitle}</a>
                    <div class="thread-meta">
                        名前: ${safeName} | 投稿日: ${new Date(t.created_at).toLocaleString()}
                    </div>
                </div>
            `;
        }).join('');
    }

    // --- 4. スレッド作成処理 ---
    document.getElementById('create-thread-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;

        const title = document.getElementById('t-title').value;
        const name = document.getElementById('t-name').value || "名無しさん";
        const content = document.getElementById('t-content').value;

        // DBに保存する際は、そのまま（生のデータ）でOK。
        // ※表示する側（loadThreadsやthread.js）でエスケープするのが基本です。
        const { data: newThread, error } = await supabaseClient
            .from('threads')
            .insert([{ title, name, content }])
            .select()
            .maybeSingle();

        if (error) {
            alert("作成失敗: " + error.message);
            btn.disabled = false;
        } else if (newThread) {
            window.location.href = `thread.html?id=${newThread.id}`;
        } else {
            // 何らかの理由でデータが返ってこない場合（RLS制限など）
            alert("スレッドを作成しましたが、リダイレクトに失敗しました。一覧を確認してください。");
            btn.disabled = false;
            loadThreads();
        }
    });

    // 起動
    loadThreads();
</script>
