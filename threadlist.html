<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スレッド一覧 - NewPlusJP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="aa">
    <h1>スレッド一覧</h1>
    <div style="margin-bottom: 20px;">
        <a href="index.html">トップページ</a> ｜ <a href="rule.html">利用規約</a>
    </div>

    <div class="form-group">
        <h3>新しくスレッドを立てる</h3>
        <form id="thread-form">
            <div class="form-group-inner">
                <label>スレッドタイトル</label>
                <input type="text" id="thread-title" placeholder="タイトルを入力" required>
            </div>
            <div class="form-group-inner">
                <label>名前（省略可）</label>
                <input type="text" id="user-name" placeholder="名無しさん">
            </div>
            <div class="form-group-inner">
                <label>本文</label>
                <textarea id="content" rows="5" placeholder="内容を入力" required></textarea>
            </div>
            <button type="submit" class="submit-btn">スレッドを作成する</button>
        </form>
    </div>

    <div id="thread-container">
        読み込み中...
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="bbs.js"></script>
</body>
</html>
