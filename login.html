<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログイン - NewPlusJP</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2" crossorigin="anonymous"></script>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f0f2f5; }
    .card { background: white; padding: 30px; border-radius: 15px; width: 300px; text-align: center; }
    input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
    button { width: 100%; padding: 10px; background: #2ed573; color: white; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2>ログイン</h2>
    <input type="text" id="user" placeholder="ユーザー名">
    <input type="password" id="pass" placeholder="パスワード">
    <button id="btn">ログイン</button>
    <p><a href="signup.html">新規登録はこちら</a></p>
  </div>

  <script>
    const config = { url: "https://ezishztrukqnrqsvaeur.supabase.co", key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6aXNoenRydWtxbnJxc3ZhZXVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTY3MzIsImV4cCI6MjA5MDA5MjczMn0.u9rkxviylgWDoI3-FExNq1EPOT_NNNNuwkLT2FLRKUU" };
    const supabase = window.supabase.createClient(config.url, config.key);

    document.getElementById('btn').onclick = async () => {
      const u = document.getElementById('user').value.trim();
      const p = document.getElementById('pass').value.trim();

      const { data, error } = await supabase.from('user_accounts').select('*').eq('username', u).eq('password', p).maybeSingle();
      
      if(data) {
        localStorage.setItem('user_display_name', u);
        localStorage.setItem('is_admin', u.toLowerCase().startsWith('admin') ? 'true' : 'false');
        if(u.toLowerCase().startsWith('admin')) localStorage.setItem('admin_name', u);
        alert("ログイン成功！");
        window.location.href = "index.html";
      } else {
        alert("名前かパスワードが違います");
      }
    };
  </script>
</body>
</html>
