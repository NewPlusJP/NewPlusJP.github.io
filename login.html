<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewPlusJP - ログイン</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* ログイン画面専用の簡易スタイル調整 */
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .main-btn {
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .main-btn:disabled {
            background-color: #ccc;
        }
        .auth-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <header>
        <h1>NewPlusJP</h1>
    </header>

    <div class="aa auth-container">
        <div id="onecolor"><h2>ログイン</h2></div>
        <p style="text-align: center; color: #666;">登録した情報を入力してください</p>
        
        <form id="login-form">
            <div class="input-group">
                <label for="username">ユーザー名</label>
                <input type="text" id="username" placeholder="名前を入力" required>
            </div>
            <div class="input-group">
                <label for="password">パスワード</label>
                <input type="password" id="password" placeholder="パスワードを入力" required>
            </div>
            <button type="submit" id="login-btn" class="main-btn">ログインする</button>
        </form>

        <div class="auth-footer">
            <p>アカウントを持っていない？ <a href="signup.html" style="color: #3498db; font-weight: bold;">新規登録はこちら</a></p>
            <p><a href="index.html" style="color: #888;">エントランスに戻る</a></p>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        /**
         * ここにあった const supabase = ... の行は削除しました。
         * config.js 内で宣言されている supabase インスタンスをそのまま使用します。
         */

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            
            loginBtn.disabled = true;
            loginBtn.innerText = "認証中...";

            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;

            try {
                // SQL側の login_user 関数を呼び出し
                const { data, error } = await supabase.rpc('login_user', { 
                    u_username: u, 
                    u_password: p 
                });

                if (error) throw error;

                if (data && data.id) {
                    // ブラウザにユーザー情報を保存
                    localStorage.setItem('user_uuid', data.id);
                    localStorage.setItem('display_name', data.username);
                    
                    // admin判定
                    if (data.username === 'admin') {
                        localStorage.setItem('is_admin', 'true');
                        localStorage.setItem('admin_name', data.username);
                    }

                    alert("ログインしました！");
                    
                    // 強制的にトップページへリダイレクト
                    window.location.replace("index.html");
                } else {
                    alert("ユーザー名またはパスワードが正しくありません。");
                    loginBtn.disabled = false;
                    loginBtn.innerText = "ログインする";
                }
            } catch (err) {
                console.error("Login Error:", err);
                alert("ログインエラー: " + (err.message || "接続エラー"));
                loginBtn.disabled = false;
                loginBtn.innerText = "ログインする";
            }
        };

        // ダークモード設定の引き継ぎ
        document.addEventListener('DOMContentLoaded', () => {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.body.style.backgroundColor = '#1a1a1a';
                document.body.style.color = '#f0f0f0';
            }
        });
    </script>
</body>
</html>
