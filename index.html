<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>NewPlusJP</title>
  <meta name="description" content="NewPlusJPの掲示板だよ！">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <header>
    <h1>NewPlusJP</h1>
    <div id="online-counter" style="text-align: right; font-size: 0.8em; color: #666; padding-right: 10px;">
      現在 0 人が閲覧中
    </div>
  </header>

  <div class="aa">
    <h1>広告</h1>
    <div class="aa">
      <div id="onecolor"><h2>のもさーばー</h2></div>
      <h3>Discord botの支援などをしています！</h3>
      <p>雑談やbot開発などを主にしています。
        <a href="https://discord.gg/qrDwaP5Kst">ここから参加！</a>
      </p>
    </div>
  </div>

  <div class="aa">
    <h2>エントランス</h2>
    <a href="rule.html" style="font-size: 1.2em; font-weight: bold;">■ 【重要】利用規約</a><br>
    <a href="threadlist.html" style="font-size: 1.2em; font-weight: bold;">■ 掲示板に入る（スレッド一覧）</a><br>
    <a href="privacy.html" style="font-size: 1.2em; font-weight: bold;">■ データの使用について</a><br>
    
    <div id="user-auth-links" style="margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ccc;">
      <div id="auth-guest">
        <a href="login.html" style="font-size: 1.1em; color: #1a73e8; font-weight: bold;">▶ ログイン</a> / 
        <a href="signup.html" style="font-size: 1.1em; color: #3498db; font-weight: bold;">▶ 新規アカウント作成</a>
      </div>
      <div id="auth-user" style="display: none;">
        <span style="font-size: 1.1em;">👤 ようこそ、<strong id="user-name-display" style="color: #2ed573;"></strong> さん</span> | 
        <a href="#" onclick="userLogout()" style="color: #e74c3c; text-decoration: none; font-weight: bold;">[ログアウト]</a>
      </div>
    </div>

    <div style="margin-top: 15px;">
      <button onclick="toggleDarkMode()" id="dark-mode-btn">🌙 モード切替</button>
      <button onclick="toggleNotification()" id="notify-btn-top" style="margin-left: 10px; cursor: pointer; padding: 5px 12px; border-radius: 5px; border: 1px solid #ccc; background: #fff;">
        🔔 通知をオンにする
      </button>
    </div>
  </div>

  <section class="aa" id="admin-section">
    <div id="onecolor"><h2>管理者メニュー</h2></div>
    <div id="admin-auth-inputs">
      <input type="text" id="admin-user" placeholder="管理者ID" style="width: 150px;">
      <input type="password" id="admin-pass" placeholder="パスワード" style="width: 150px;">
      <button onclick="handleAdminLogin()" class="submit-btn">ログイン</button>
    </div>
    <div id="admin-console" style="display:none;">
      <p>管理者：<strong id="admin-name"></strong> としてログイン中</p>
      <button onclick="logout()" class="submit-btn" style="background-color: #e74c3c;">ログアウト</button>
    </div>
  </section>

  <section class="aa" id="create-thread">
    <div id="onecolor"><h2>新規スレッドを作成する</h2></div>
    <form id="thread-form">
      <div class="form-group-inner">
        <label for="thread-title">スレッドタイトル</label>
        <input type="text" id="thread-title" placeholder="タイトル" required>
      </div>
      <div id="admin-thread-option"></div>
      <div class="form-group-inner">
        <label for="user-name">名前（省略可）</label>
        <input type="text" id="user-name" placeholder="名無しさん">
      </div>
      <div class="form-group-inner">
        <label for="content">本文</label>
        <textarea id="content" rows="8" required></textarea>
      </div>
      <button type="submit" class="submit-btn" id="create-btn">スレッドを作成する</button>
    </form>
  </section>

  <section class="aa">
    <div id="onecolor"><h2>スレッド一覧</h2></div>
    <div id="thread-container">
      <p>読み込み中...</p>
    </div>
  </section>

  <script src="config.js"></script>
  <script src="bbs.js"></script>
  <script>
    // テーマ・カウンター用のインラインスクリプト
    function toggleDarkMode() {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.body.style.backgroundColor = next === 'dark' ? '#1a1a1a' : '#f0f2f5';
      document.body.style.color = next === 'dark' ? '#f0f0f0' : '#333';
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.body.style.backgroundColor = '#1a1a1a';
        document.body.style.color = '#f0f0f0';
      }
      const counterEl = document.getElementById('online-counter');
      if (counterEl) counterEl.innerText = `現在 ${Math.floor(Math.random() * 8) + 1} 人が閲覧中`;
    });
  </script>
</body>
</html>
